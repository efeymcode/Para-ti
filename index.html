<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi pulga 🎶</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(#fce4ec, #f8bbd0);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* Título */
.title {
    font-family: 'Dancing Script', cursive;
    font-size: 32px;
    color: #d81b60;
    margin-bottom: 20px;
}

/* Vinilo */
.vinyl {
    width: 230px;
    height: 230px;
    border-radius: 50%;
    background: url('pulga.jpg') no-repeat center/cover;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    animation: spin 3s linear infinite;
    animation-play-state: paused;
    position: relative;
}

/* Centro del vinilo */
.vinyl::after {
    content: "";
    width: 22px;
    height: 22px;
    background: #111;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* Animación giro */
@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* Botones */
.controls {
    margin-top: 25px;
}

button {
    background: #d81b60;
    color: white;
    border: none;
    padding: 12px 22px;
    border-radius: 25px;
    margin: 0 10px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #ad1457;
}
</style>
</head>

<body>

<div class="title">Mi pulga 💖</div>

<div class="vinyl" id="vinyl"></div>

<div class="controls">
    <button onclick="playMusic()">▶️ Play</button>
    <button onclick="pauseMusic()">⏸ Pause</button>
</div>

<audio id="audio" src="cancion.mp3"></audio>

<script>
let audio = document.getElementById("audio");
let vinyl = document.getElementById("vinyl");

function playMusic() {
    audio.play();
    vinyl.style.animationPlayState = "running";
}

function pauseMusic() {
    audio.pause();
    vinyl.style.animationPlayState = "paused";
}
</script>

</body>
</html>
